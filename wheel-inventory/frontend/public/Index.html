<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="OEM Subaru Wheel Inventory Management System with Barcode Scanning" />
    <title>Wheel Inventory System v2.2.1 - Barcode Scanning</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      code {
        font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New',
          monospace;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .animate-spin {
        animation: spin 1s linear infinite;
      }

      /* Quagga.js camera styles */
      #barcode-scanner {
        position: relative;
      }

      #barcode-scanner video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #barcode-scanner canvas {
        position: absolute;
        top: 0;
        left: 0;
      }

      /* Scanline overlay */
      #barcode-scanner canvas.drawingBuffer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      @media print {
        body * {
          visibility: hidden;
        }
        #barcode-label, #barcode-label * {
          visibility: visible;
        }
        #barcode-label {
          position: absolute;
          left: 0;
          top: 0;
        }
      }
    </style>

    <script>
      // Debug logging
      console.log('=== Barcode Scanner Debug ===');
      
      // Check for getUserMedia support
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        console.log('✅ getUserMedia is supported');
      } else {
        console.error('❌ getUserMedia is NOT supported');
      }
      
      // Make Quagga available globally
      window.addEventListener('load', function() {
        console.log('Page loaded, checking libraries...');
        
        // Check if QuaggaJS loaded
        if (window.QuaggaJS) {
          window.Quagga = window.QuaggaJS;
          console.log('✅ Quagga.js loaded successfully');
          console.log('Quagga version:', window.Quagga);
        } else {
          console.error('❌ Quagga.js failed to load');
        }
        
        // Check other libraries
        if (window.JsBarcode) {
          console.log('✅ JsBarcode loaded');
        } else {
          console.error('❌ JsBarcode failed to load');
        }
        
        if (window.html2canvas) {
          console.log('✅ html2canvas loaded');
        } else {
          console.error('❌ html2canvas failed to load');
        }
        
        if (window.jspdf) {
          console.log('✅ jsPDF loaded');
        } else {
          console.error('❌ jsPDF failed to load');
        }
        
        console.log('=== Library check complete ===');
      });
      
      // Test camera access on page load (for debugging)
      window.addEventListener('load', async function() {
        try {
          const devices = await navigator.mediaDevices.enumerateDevices();
          const cameras = devices.filter(device => device.kind === 'videoinput');
          console.log(`Found ${cameras.length} camera(s):`, cameras.map(c => c.label || 'Unknown camera'));
        } catch (err) {
          console.error('Could not enumerate devices:', err);
        }
      });
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
